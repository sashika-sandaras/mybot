name: Send Movie File (Final Fix)

on:
  workflow_dispatch:
    inputs:
      file_id:
        description: 'වීඩියෝ එකේ ID එක (GDrive හෝ VOE)'
        required: true
        default: '16WlbtOM4waRMqpDa34mQpyYFKdthqASf'
      user_jid:
        description: 'ඔයාගේ WhatsApp Number එක'
        required: true
        default: '94766886046@s.whatsapp.net'

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install requests gdown
          npm install @whiskeysockets/baileys pino axios

      - name: Run Script
        env:
          VOE_KEY: ${{ secrets.VOE_KEY }}
          SESSION_ID: ${{ secrets.SESSION_ID }}
          FILE_ID: ${{ github.event.inputs.file_id }}
          USER_JID: ${{ github.event.inputs.user_jid }}
        run: |
          cat <<'EOF' > downloader.py
          import os, requests, sys, gdown

          file_id = os.getenv('FILE_ID')
          voe_key = os.getenv('VOE_KEY')
          output = 'movie_mflix.mp4'

          try:
              if len(file_id) > 20: # GDrive Detect
                  print(f"Downloading from GDrive using gdown: {file_id}")
                  url = f'https://drive.google.com/uc?id={file_id}'
                  gdown.download(url, output, quiet=False, fuzzy=True)
              else: # VOE Detect
                  api_url = f"https://voe.sx/api/drive/v2/file/info?key={voe_key}&file_code={file_id}"
                  r = requests.get(api_url).json()
                  direct_url = r.get('result', {}).get('direct_url')
                  if direct_url:
                      print(f"Downloading from VOE: {direct_url}")
                      with requests.get(direct_url, stream=True) as r_file:
                          with open(output, 'wb') as f:
                              for chunk in r_file.iter_content(chunk_size=1024*1024):
                                  if chunk: f.write(chunk)
                  else:
                      print("Error: VOE Direct link not found")
                      sys.exit(1)

              size = os.path.getsize(output)
              print(f"Download Finished! Size: {size / (1024*1024):.2f} MB")
              
              if size < 100000:
                  print("Error: File is too small.")
                  sys.exit(1)
          except Exception as e:
              print(f"Critical Error: {e}")
              sys.exit(1)
          EOF
          
          python3 downloader.py
          node send.js
